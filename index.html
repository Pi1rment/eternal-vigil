<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal Vigil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0f;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        canvas { display: block; }
        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        #title {
            font-size: 32px;
            color: #ff9900;
            text-shadow: 0 0 30px #ff6600, 0 0 60px #ff3300;
            letter-spacing: 6px;
            font-weight: bold;
        }
        #subtitle {
            font-size: 13px;
            color: #a08060;
            letter-spacing: 3px;
            margin-top: 4px;
        }
        #counter {
            font-size: 14px;
            color: #c8a870;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        #checkin-btn {
            margin-top: 15px;
            padding: 12px 35px;
            background: linear-gradient(180deg, #ff8800, #cc4400);
            color: #fff8e0;
            border: 2px solid #ff6600;
            font-size: 15px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 0 25px #ff4400, inset 0 1px 0 rgba(255,255,255,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        #checkin-btn:hover {
            background: linear-gradient(180deg, #ffaa00, #ff5500);
            box-shadow: 0 0 40px #ff6600;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="title">⚔️ THE ETERNAL VIGIL ⚔️</div>
        <div id="subtitle">GUARD YOUR FLAME. SURVIVE THE NIGHT.</div>
        <div id="counter">Torches burning: <span id="alive">0</span> / <span id="total">0</span></div>
        <button id="checkin-btn" onclick="checkin()">🔥 CONFIRM YOUR WATCH</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const players = [
            {name: "You", alive: true, x: 0.45, y: 0.62},
            {name: "Warrior_1", alive: true, x: 0.15, y: 0.58},
            {name: "Guard_2", alive: false, x: 0.72, y: 0.55},
            {name: "Knight_3", alive: true, x: 0.85, y: 0.6},
            {name: "Shadow_4", alive: false, x: 0.32, y: 0.64},
            {name: "Sentinel_5", alive: true, x: 0.6, y: 0.56},
        ];

        let time = 0;

        function drawSky() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.65);
            grad.addColorStop(0, '#020208');
            grad.addColorStop(0.5, '#0a0818');
            grad.addColorStop(1, '#1a100a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.65);
        }

        function drawStars() {
            for(let i = 0; i < 150; i++) {
                const x = (Math.sin(i * 567.3) * 0.5 + 0.5) * canvas.width;
                const y = (Math.sin(i * 234.7) * 0.5 + 0.5) * canvas.height * 0.55;
                const twinkle = Math.sin(time * 0.04 + i * 1.3) * 0.5 + 0.5;
                const size = twinkle * 1.5 + 0.3;
                ctx.globalAlpha = twinkle * 0.8 + 0.2;
                ctx.fillStyle = i % 5 === 0 ? '#ffeedd' : '#ffffff';
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawMoon() {
            const mx = canvas.width * 0.82;
            const my = canvas.height * 0.12;
            // Moon glow
            const glow = ctx.createRadialGradient(mx, my, 0, mx, my, 120);
            glow.addColorStop(0, 'rgba(255, 248, 200, 0.15)');
            glow.addColorStop(1, 'rgba(255, 248, 200, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(mx, my, 120, 0, Math.PI * 2);
            ctx.fill();

            // Moon body
            const moonGrad = ctx.createRadialGradient(mx - 10, my - 10, 5, mx, my, 38);
            moonGrad.addColorStop(0, '#fffef0');
            moonGrad.addColorStop(0.6, '#f5e8b0');
            moonGrad.addColorStop(1, '#d4c070');
            ctx.fillStyle = moonGrad;
            ctx.beginPath();
            ctx.arc(mx, my, 38, 0, Math.PI * 2);
            ctx.fill();

            // Moon craters
            ctx.fillStyle = 'rgba(180, 160, 80, 0.3)';
            ctx.beginPath(); ctx.arc(mx + 10, my + 8, 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(mx - 12, my - 5, 5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(mx + 5, my - 15, 4, 0, Math.PI * 2); ctx.fill();
        }

        function drawCastle() {
            const w = canvas.width;
            const h = canvas.height;
            const wallTop = h * 0.5;

            // Background towers (far)
            ctx.fillStyle = '#0f0d0a';
            drawTower(w * 0.05, wallTop - 180, 70, 180);
            drawTower(w * 0.92, wallTop - 160, 65, 160);
            drawTower(w * 0.5, wallTop - 220, 80, 220);

            // Wall gradient
            const wallGrad = ctx.createLinearGradient(0, wallTop, 0, h);
            wallGrad.addColorStop(0, '#2a2018');
            wallGrad.addColorStop(0.3, '#221a10');
            wallGrad.addColorStop(1, '#0f0d08');
            ctx.fillStyle = wallGrad;
            ctx.fillRect(0, wallTop, w, h - wallTop);

            // Wall top edge highlight
            ctx.fillStyle = '#3a2e1c';
            ctx.fillRect(0, wallTop, w, 4);

            // Battlements
            const bw = 55;
            const bh = 55;
            const gap = 35;
            for(let x = -10; x < w + bw; x += bw + gap) {
                const batGrad = ctx.createLinearGradient(x, wallTop - bh, x + bw, wallTop);
                batGrad.addColorStop(0, '#2e2416');
                batGrad.addColorStop(1, '#1e1810');
                ctx.fillStyle = batGrad;
                ctx.fillRect(x, wallTop - bh, bw, bh);

                // Battlement top highlight
                ctx.fillStyle = '#3e3020';
                ctx.fillRect(x, wallTop - bh, bw, 3);
            }

            // Wall stone texture
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 1.5;
            let offset = 0;
            for(let y = wallTop + 15; y < h; y += 28) {
                offset = offset === 0 ? 30 : 0;
                for(let x = offset; x < w; x += 60) {
                    ctx.strokeRect(x, y, 58, 26);
                }
            }

            // Wall ambient light from torches
            players.forEach(p => {
                if(p.alive) {
                    const px = p.x * w;
                    const py = p.y * h;
                    const light = ctx.createRadialGradient(px, py, 0, px, py, 120);
                    light.addColorStop(0, 'rgba(255, 140, 0, 0.12)');
                    light.addColorStop(1, 'rgba(255, 60, 0, 0)');
                    ctx.fillStyle = light;
                    ctx.fillRect(0, wallTop, w, h - wallTop);
                }
            });
        }

        function drawTower(x, y, w, h) {
            ctx.fillRect(x, y, w, h + 200);
            // Tower battlements
            const bw = 18;
            for(let i = 0; i < 3; i++) {
                ctx.fillRect(x + i * (bw + 8), y - 25, bw, 25);
            }
            // Tower window
            ctx.fillStyle = 'rgba(255, 140, 0, 0.08)';
            ctx.fillRect(x + w/2 - 8, y + 40, 16, 24);
        }
function drawTorch(x, y, alive) {
            // Wall bracket
            ctx.fillStyle = '#4a3520';
            ctx.fillRect(x - 12, y - 5, 24, 6);
            ctx.fillStyle = '#3a2515';
            ctx.fillRect(x - 3, y, 6, 35);

            if(alive) {
                const f1 = Math.sin(time * 0.25 + x * 0.01) * 4;
                const f2 = Math.cos(time * 0.18 + y * 0.01) * 3;
                const f3 = Math.sin(time * 0.35 + x * 0.02) * 2;

                // Outer glow
                const outerGlow = ctx.createRadialGradient(x + f1*0.3, y - 20, 0, x, y, 90);
                outerGlow.addColorStop(0, 'rgba(255, 120, 0, 0.25)');
                outerGlow.addColorStop(0.5, 'rgba(255, 60, 0, 0.08)');
                outerGlow.addColorStop(1, 'rgba(255, 0, 0, 0)');
                ctx.fillStyle = outerGlow;
                ctx.beginPath();
                ctx.arc(x, y - 10, 90, 0, Math.PI * 2);
                ctx.fill();

                // Main flame
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff6600';
                ctx.fillStyle = '#ff7700';
                ctx.beginPath();
                ctx.moveTo(x - 10, y);
                ctx.quadraticCurveTo(x + f1, y - 25, x + f2, y - 45 + f3);
                ctx.quadraticCurveTo(x + 10, y - 25, x + 8, y);
                ctx.fill();

                // Inner flame
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.moveTo(x - 5, y);
                ctx.quadraticCurveTo(x + f1*0.5, y - 18, x + f2*0.5, y - 32 + f3);
                ctx.quadraticCurveTo(x + 5, y - 18, x + 4, y);
                ctx.fill();

                // Core
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.ellipse(x + f1*0.2, y - 10, 2, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Sparks
                for(let s = 0; s < 3; s++) {
                    const sparkX = x + Math.sin(time * 0.3 + s * 2.1) * 8;
                    const sparkY = y - 40 - (time * 0.5 + s * 20) % 30;
                    const sparkA = 1 - ((time * 0.5 + s * 20) % 30) / 30;
                    ctx.globalAlpha = sparkA * 0.8;
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.arc(sparkX, sparkY, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

            } else {
                // Dead - embers
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.ellipse(x, y - 5, 6, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Ghost
                ctx.globalAlpha = 0.25 + Math.sin(time * 0.05) * 0.1;
                ctx.fillStyle = '#8899ff';
                ctx.font = '28px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('👻', x, y - 35);
                ctx.globalAlpha = 1;
            }
        }

        function drawPlayers() {
            let alive = 0;
            players.forEach(p => {
                if(p.alive) alive++;
                const x = p.x * canvas.width;
                const y = p.y * canvas.height;
                drawTorch(x, y, p.alive);

                ctx.font = '11px Georgia';
                ctx.textAlign = 'center';
                ctx.fillStyle = p.alive ? 'rgba(232, 213, 163, 0.9)' : 'rgba(80, 70, 60, 0.7)';
                ctx.fillText(p.name, x, y + 50);
            });
            document.getElementById('alive').textContent = alive;
            document.getElementById('total').textContent = players.length;
        }

        function drawFog() {
            for(let i = 0; i < 3; i++) {
                const fogX = (Math.sin(time * 0.005 + i * 2) * 0.3 + 0.2 + i * 0.25) * canvas.width;
                const fogY = canvas.height * 0.48;
                const fog = ctx.createRadialGradient(fogX, fogY, 0, fogX, fogY, 200);
                fog.addColorStop(0, 'rgba(20, 15, 10, 0.3)');
                fog.addColorStop(1, 'rgba(20, 15, 10, 0)');
                ctx.fillStyle = fog;
                ctx.beginPath();
                ctx.ellipse(fogX, fogY, 250, 60, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            time++;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawSky();
            drawStars();
            drawMoon();
            drawCastle();
            drawFog();
            drawPlayers();
            requestAnimationFrame(animate);
        }

        function checkin() {
            alert('✅ Watch confirmed! Your torch burns for another night.');
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
