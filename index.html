<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eternal Vigil</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0a0f;
            color: #e8d5a3;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #castle {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(ellipse at center, #1a1008 0%, #0a0a0f 100%);
        }
        .torch {
            position: absolute;
            width: 60px;
            height: 60px;
            cursor: pointer;
        }
        .flame {
            width: 20px;
            height: 30px;
            background: radial-gradient(ellipse, #ff9900, #ff4400);
            border-radius: 50% 50% 30% 30%;
            margin: 0 auto;
            animation: flicker 0.5s infinite alternate;
            box-shadow: 0 0 20px #ff6600, 0 0 40px #ff4400;
        }
        .flame.dead {
            background: #333;
            box-shadow: none;
            animation: none;
        }
        @keyframes flicker {
            0% { transform: scaleX(1) scaleY(1); opacity: 1; }
            100% { transform: scaleX(0.9) scaleY(1.1); opacity: 0.8; }
        }
        .player-name {
            font-size: 10px;
            text-align: center;
            color: #e8d5a3;
            margin-top: 5px;
        }
        .dead .player-name { color: #444; }
        #ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }
        #title {
            font-size: 28px;
            color: #ff9900;
            text-shadow: 0 0 20px #ff6600;
            letter-spacing: 4px;
        }
        #counter {
            font-size: 14px;
            color: #a08060;
            margin-top: 5px;
        }
        #checkin-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #ff6600;
            color: #000;
            border: none;
            font-size: 16px;
            font-family: 'Georgia', serif;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 20px #ff4400;
        }
        #checkin-btn:hover { background: #ff9900; }
    </style>
</head>
<body>
    <div id="castle"></div>
    <div id="ui">
        <div id="title">⚔️ THE ETERNAL VIGIL ⚔️</div>
        <div id="counter">Факелів горить: <span id="alive">0</span></div>
        <button id="checkin-btn" onclick="checkin()">🔥 ПІДТВЕРДИТИ ВАРТУ</button>
    </div>

    <script>
        const players = [
            {name: "Ти", alive: true, x: 45, y: 60},
            {name: "Воїн_1", alive: true, x: 20, y: 40},
            {name: "Страж_2", alive: false, x: 70, y: 35},
            {name: "Лицар_3", alive: true, x: 80, y: 65},
            {name: "Тінь_4", alive: false, x: 35, y: 75},
            {name: "Вартовий_5", alive: true, x: 60, y: 25},
        ];

        function render() {
            const castle = document.getElementById('castle');
            castle.innerHTML = '';
            let alive = 0;
            players.forEach(p => {
                if(p.alive) alive++;
                const torch = document.createElement('div');
                torch.className = 'torch' + (p.alive ? '' : ' dead');
                torch.style.left = p.x + '%';
                torch.style.top = p.y + '%';
                torch.innerHTML = 
                    <div class="flame ${p.alive ? '' : 'dead'}"></div>
                    <div class="player-name">${p.name}</div>
                ;
                castle.appendChild(torch);
            });
            document.getElementById('alive').textContent = alive;
        }

        function checkin() {
            alert('✅ Варту підтверджено! Твій факел горить ще одну ніч.');
        }
 render();
    </script>
</body>
</html>
